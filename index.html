<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./style/assets.css">
    <link rel="stylesheet" href="./style/fonts.css">
    <link rel="stylesheet" href="./style/standard.css">
    <link rel="stylesheet" href="./style/dialog.css">
    

    <script src="./script.js" defer></script>
    
    <script src="./script/storage.js" defer></script>
    <script src="./script/template.js" defer></script>


    <title>Pokedex</title>
</head>

<body onload="init()">
    <header id="header-container">
        <div class="header-line">
            <a href="index.html"><img class="img-logo" src="./assets/img/95c-pokeball-1594373.png" alt="Pokeball"></a>
            <h1 id="headline">Pokedex</h1>
            <input type="text" data-id="search-input" id="search-input" placeholder="Search Pokemon" oninput="searchPokemon()">
    </header>


    <main data-id="content">

        <div id="main-container">
            <div id="loading-spinner"></div>
            <div id="poke-card-container"></div>
            <button data-id="load-more-button" class="load-button" onclick="loadMore()">Mehr Laden</button>
        </div>
        <dialog data-id="dialog" id="dialog-window"></dialog>
    </main>






    <footer id="footer-container">
        <div class="footer-content">
            <p class="copy-right">© 2026 Pokedex</p>
            <a href="./assets/components/imprint.html">Impressum</a>
            <a href="./assets/components/privacy_policy.html">Datenschutz</a>
        </div>
    </footer>

</body>

</html>
